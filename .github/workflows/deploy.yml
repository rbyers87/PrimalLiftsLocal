name: Deploy PrimalLifts to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clean previous build
        run: |
          echo "🧹 Cleaning previous build artifacts..."
          rm -rf dist
          echo "✅ Cleaned dist folder"

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_APP_URL=https://${{ github.repository_owner }}.github.io/PrimalLifts/
          VITE_BASE_URL=/PrimalLifts/
          EOF

      - name: Build project
        run: npm run build
        env:
          VITE_APP_URL: https://${{ github.repository_owner }}.github.io/PrimalLifts/
          VITE_BASE_URL: /PrimalLifts/

      - name: Copy root static assets to dist
        run: |
          echo "📁 Copying root static assets to dist..."
          
          # Copy manifest files
          if [ -f "manifest.json" ]; then
            cp manifest.json dist/
            echo "✅ Copied manifest.json"
          fi
          
          if [ -f "site.webmanifest" ]; then
            cp site.webmanifest dist/
            echo "✅ Copied site.webmanifest"
          fi
          
          # Copy custom service worker (use our custom one)
          if [ -f "sw.js" ]; then
            cp sw.js dist/
            echo "✅ Copied custom sw.js"
          fi
          
          # Copy icons folder
          if [ -d "icons" ]; then
            cp -r icons dist/
            echo "✅ Copied icons folder"
          fi
          
          # Copy placeholder image if it exists
          if [ -f "icons/placeholder-welcome.jpg" ]; then
            cp icons/placeholder-welcome.jpg dist/
            echo "✅ Copied placeholder image"
          fi
          
          # Fix for GitHub Pages subdirectory - copy index.html to 404.html
          if [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
            echo "✅ Created 404.html for client-side routing"
          fi
          
          # Show what's in dist for debugging
          echo ""
          echo "📁 Dist contents:"
          ls -la dist/
          if [ -d "dist/icons" ]; then
            echo ""
            echo "📁 Icons contents:"
            ls -la dist/icons/
          fi

      - name: Create .nojekyll file
        run: |
          touch dist/.nojekyll
          echo "✅ Created .nojekyll file"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy PrimalLifts - ${{ github.event.head_commit.message }}'

      - name: Deployment complete
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "🌐 Your site will be available at:"
          echo "   https://${{ github.repository_owner }}.github.io/PrimalLifts/"
          echo ""
          echo "⏱️  It may take 1-3 minutes for GitHub Pages to update."
