name: Deploy PrimalLifts to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clean previous build
        run: |
          echo "🧹 Cleaning previous build artifacts..."
          rm -rf dist
          echo "✅ Cleaned dist folder"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Copy assets to dist
        run: |
          echo "📁 Copying assets to dist..."
          
          # Copy manifest files (will be generated by VitePWA)
          if [ -f "dist/manifest.json" ]; then
            echo "✅ manifest.json already exists in dist"
          fi
          
          # Copy icons folder
          if [ -d "icons" ]; then
            cp -r icons dist/
            echo "✅ Copied icons folder"
          fi
          
          # Copy favicon
          if [ -f "favicon.ico" ]; then
            cp favicon.ico dist/
            echo "✅ Copied favicon.ico"
          fi
          
          # Show what's in dist
          echo ""
          echo "📁 Dist contents:"
          ls -la dist/
          if [ -d "dist/icons" ]; then
            echo ""
            echo "📁 Icons contents:"
            ls -la dist/icons/
          fi

      - name: Create .nojekyll file
        run: |
          touch dist/.nojekyll
          echo "✅ Created .nojekyll file"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy PrimalLifts - ${{ github.event.head_commit.message }}'

      - name: Deployment complete
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "🌐 Your site will be available at:"
          echo "   https://${{ github.repository_owner }}.github.io/PrimalLiftsLocal/"
