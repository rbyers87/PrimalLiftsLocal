name: Deploy PrimalLifts to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clean previous build
        run: |
          echo "🧹 Cleaning previous build artifacts..."
          rm -rf dist
          echo "✅ Cleaned dist folder"

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ONESIGNAL_APP_ID=${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_APP_URL=https://${{ github.repository_owner }}.github.io/PrimalLifts/
          VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_CLOUDINARY_API_KEY=${{ secrets.VITE_CLOUDINARY_API_KEY }}
          VITE_CLOUDINARY_API_SECRET=${{ secrets.VITE_CLOUDINARY_API_SECRET }}
          EOF

      - name: Debug environment variables
        run: |
          echo "🔍 Checking environment variables..."
          echo "VITE_SUPABASE_URL is set to: ${{ secrets.VITE_SUPABASE_URL }}"
          echo "VITE_CLOUDINARY_CLOUD_NAME is set to: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}"
          echo "✅ Environment variables verified"

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_CLOUDINARY_API_KEY: ${{ secrets.VITE_CLOUDINARY_API_KEY }}
          VITE_CLOUDINARY_API_SECRET: ${{ secrets.VITE_CLOUDINARY_API_SECRET }}

      - name: Copy root static assets to dist
        run: |
          echo "📁 Copying root static assets to dist..."
          
          # Copy manifest files
          if [ -f "manifest.json" ]; then
            cp manifest.json dist/
            echo "✅ Copied manifest.json"
          fi
          
          if [ -f "site.webmanifest" ]; then
            cp site.webmanifest dist/
            echo "✅ Copied site.webmanifest"
          fi
          
          # Copy service worker
          if [ -f "service-worker.js" ]; then
            cp service-worker.js dist/
            echo "✅ Copied service-worker.js"
          fi
          
          # Copy icons folder
          if [ -d "icons" ]; then
            cp -r icons dist/
            echo "✅ Copied icons folder"
          fi
          
          # Show what's in dist for debugging
          echo ""
          echo "📁 Dist contents:"
          ls -la dist/
          if [ -d "dist/icons" ]; then
            echo ""
            echo "📁 Icons contents:"
            ls -la dist/icons/
          fi
          
          # Check if index.html was built correctly
          if [ -f "dist/index.html" ]; then
            echo ""
            echo "📄 Checking index.html script tag:"
            grep -o 'src="[^"]*"' dist/index.html | grep -E 'main|assets' || echo "No script tag found"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy PrimalLifts - ${{ github.event.head_commit.message }}'

      - name: Deployment complete
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "🌐 Your site will be available at:"
          echo "   https://${{ github.repository_owner }}.github.io/PrimalLifts/"
          echo ""
          echo "⏱️  It may take 1-3 minutes for GitHub Pages to update."
          echo ""
          echo "🔍 Check deployment at:"
          echo "   https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/deployments"
